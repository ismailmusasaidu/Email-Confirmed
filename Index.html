<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Danhausa Logistics</title>
<style>
  body { margin:0; padding:0; font-family:Arial, sans-serif; background:#f8f5f0; }
  .container { max-width:600px; margin:80px auto; background:#fff; padding:40px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1); text-align:center; }
  .header { font-size:28px; font-weight:bold; background:linear-gradient(90deg,#1a1a1a,#2d1a00,#3d2200); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px; }
  .subtitle { font-size:16px; color:#555; margin-bottom:30px; }
  .btn { display:inline-block; background:linear-gradient(90deg,#f97316,#e85d04); color:#fff; text-decoration:none; padding:14px 30px; border-radius:6px; font-size:16px; font-weight:bold; transition:0.3s; }
  .btn:hover { opacity:0.9; }
  .footer { margin-top:40px; font-size:12px; color:#777; }
</style>
</head>
<body>

<div class="container">
  <div class="header">Welcome to Danhausa Logistics!</div>
  <div class="subtitle">
    Your email has been successfully confirmed. Tap the button below to open the app and get started.
  </div>

  <a href="#" id="openAppBtn" class="btn">
    Open the App
  </a>

  <div class="footer">
    © 2026 Danhausa Logistics. All rights reserved.<br>Kano, Nigeria
  </div>
</div>

<script>
  const btn = document.getElementById('openAppBtn');

  btn.addEventListener('click', function(e) {
    e.preventDefault();
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

    // iOS
    if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
      // iOS Custom URL scheme
      window.location = "danhausa://open";
      // fallback to App Store after short delay
      setTimeout(() => {
        window.location = "https://apps.apple.com/app/idYOUR_APPLE_APP_ID";
      }, 2000);
    }
    // Android
    else if (/android/i.test(userAgent)) {
      // Android Intent Link
      window.location = "intent://open#Intent;scheme=danhausa;package=com.yourapp.package;end";
    }
    // Desktop or unknown
    else {
      alert("Please open this page on your mobile device to launch the app.");
    }
  });
</script>

</body>
</html>
